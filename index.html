<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UGC NET Paper 1 — Diagnostic Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080810;--bg2:#0f0f1e;--bg3:#161628;
  --gold:#e8a020;--gold2:#f5c055;--crimson:#e05050;
  --teal:#3abfb1;--violet:#8b6fd4;--text:#e8e4d8;
  --muted:#7a7590;--border:rgba(232,160,32,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body.hindi{font-family:'Tiro Devanagari Hindi','IBM Plex Sans',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,160,32,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,160,32,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;}
.hidden{display:none!important;}

/* ── LANG ── */
.lang-toggle{position:fixed;top:18px;right:20px;z-index:999;display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:4px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.lang-btn{padding:7px 18px;border-radius:100px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted);letter-spacing:.5px;font-family:'IBM Plex Sans',sans-serif;}
.lang-btn.active{background:var(--gold);color:#1a0e00;}

/* ── HOME ── */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px 80px;}
.home-header{text-align:center;margin-bottom:44px;}
.badge{display:inline-block;background:rgba(232,160,32,.12);border:1px solid var(--border);color:var(--gold);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:6px 18px;border-radius:100px;margin-bottom:20px;}
.home-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.4rem);line-height:1.15;color:#fff;margin-bottom:14px;}
.home-sub{color:var(--muted);font-size:15px;font-weight:300;max-width:520px;line-height:1.75;margin:0 auto;}
.single-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:520px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.single-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s;}
.single-card:hover{border-color:rgba(232,160,32,.45);transform:translateY(-5px);box-shadow:0 24px 70px rgba(0,0,0,.6);}
.single-card:hover::before{opacity:1;}
.card-icon{width:58px;height:58px;background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:22px;}
.card-name{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;margin-bottom:12px;line-height:1.3;}
.card-desc{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:20px;}
.card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.tag{font-size:11px;font-weight:500;padding:5px 12px;border-radius:100px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s;}
.btn-gold{background:var(--gold);color:#1a0e00;}
.btn-gold:hover{background:var(--gold2);transform:scale(1.03);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-violet{background:var(--violet);color:#fff;}
.btn-violet:hover{background:#a080e8;transform:scale(1.03);}
.btn-green{background:#2ecc71;color:#001a08;font-weight:600;}
.btn-green:hover{background:#3de080;transform:scale(1.03);}
.btn-green:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* ── QUIZ ── */
#quiz{min-height:100vh;padding:28px 20px 60px;max-width:740px;margin:0 auto;}
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.quiz-unit-lbl{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.quiz-unit-name{font-family:'Playfair Display',serif;font-size:1rem;color:#fff;margin-top:2px;}
.timer-badge{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:var(--gold);background:rgba(232,160,32,.1);border:1px solid var(--border);padding:8px 16px;border-radius:8px;min-width:68px;text-align:center;transition:color .3s,background .3s;}
.timer-badge.warn{color:var(--crimson);background:rgba(224,80,80,.1);border-color:rgba(224,80,80,.3);}
.progress-bar-wrap{margin-bottom:20px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
.progress-bar{height:4px;background:var(--bg3);border-radius:100px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:100px;transition:width .4s ease;}
.dot-row{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap;}
.dot{width:11px;height:11px;border-radius:50%;background:var(--bg3);border:1px solid rgba(255,255,255,.1);transition:all .3s;}
/* dots only show answered, not correct/wrong */
.dot.answered-dot{background:rgba(232,160,32,.5);border-color:var(--gold);}
/* correct/wrong dots only shown AFTER unlock */
.unlocked .dot.correct-dot{background:#2ecc71;border-color:#2ecc71;}
.unlocked .dot.wrong-dot{background:var(--crimson);border-color:var(--crimson);}
.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;margin-bottom:20px;animation:slideUp .3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.passage-box{background:var(--bg3);border-left:3px solid var(--gold);padding:14px 18px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.85;color:#cbc8be;margin-bottom:22px;}
.di-table-box{background:var(--bg3);border:1px solid rgba(58,191,177,.2);border-radius:8px;padding:14px 18px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.8;color:var(--teal);margin-bottom:22px;white-space:pre;overflow-x:auto;}
.q-text{font-size:16px;line-height:1.7;color:var(--text);margin-bottom:22px;}
.options{display:flex;flex-direction:column;gap:11px;}
.opt-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:10px;cursor:pointer;transition:all .2s;text-align:left;width:100%;}
.opt-btn:hover{border-color:rgba(232,160,32,.35);background:rgba(232,160,32,.04);}
/* selected = gold, not correct/wrong */
.opt-btn.selected{border-color:var(--gold);background:rgba(232,160,32,.1);}
.opt-btn.selected .opt-letter{background:var(--gold);color:#1a0e00;}
/* correct/wrong ONLY visible after unlock */
.unlocked .opt-btn.correct{border-color:#2ecc71;background:rgba(46,204,113,.08);}
.unlocked .opt-btn.correct .opt-letter{background:#2ecc71;color:#001a08;}
.unlocked .opt-btn.wrong{border-color:var(--crimson);background:rgba(224,80,80,.08);}
.unlocked .opt-btn.wrong .opt-letter{background:var(--crimson);color:#fff;}
.opt-letter{width:28px;height:28px;flex-shrink:0;background:rgba(255,255,255,.06);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);font-family:'IBM Plex Mono',monospace;transition:all .2s;}
.opt-text{font-size:14px;color:var(--text);line-height:1.5;}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;}
.q-counter{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;cursor:pointer;transition:color .2s;background:none;border:none;font-family:'IBM Plex Sans',sans-serif;margin-bottom:24px;}
.back-btn:hover{color:var(--gold);}

/* ── RESULTS ── */
#results{min-height:100vh;padding:40px 20px 80px;max-width:880px;margin:0 auto;}
.results-title{font-family:'Playfair Display',serif;font-size:1.9rem;color:#fff;margin-bottom:8px;}
.results-sub{color:var(--muted);font-size:14px;margin-bottom:36px;}
.score-hero{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;}
.score-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;text-align:center;min-width:120px;position:relative;}
.score-val{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;line-height:1;transition:filter .5s;}
.score-lbl{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:1px;}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
@media(max-width:620px){.results-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;}
.chart-title{font-family:'Playfair Display',serif;font-size:1rem;color:#fff;margin-bottom:18px;align-self:flex-start;position:relative;z-index:2;}
.breakdown-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;}
.unit-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.unit-row:last-child{border-bottom:none;}
.unit-name{font-size:12px;font-weight:500;flex:1;color:var(--text);min-width:80px;}
.unit-score{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);min-width:28px;text-align:right;transition:filter .5s;}
.unit-bar-wrap{flex:2;height:5px;background:var(--bg3);border-radius:100px;overflow:hidden;}
.unit-bar{height:100%;border-radius:100px;transition:width 1s ease,filter .5s;}
.weak-tag{font-size:10px;padding:2px 7px;border-radius:100px;background:rgba(224,80,80,.15);color:var(--crimson);border:1px solid rgba(224,80,80,.3);white-space:nowrap;}
.strong-tag{font-size:10px;padding:2px 7px;border-radius:100px;background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.25);white-space:nowrap;}
.weakness-alert{border-radius:14px;padding:22px 26px;margin-bottom:24px;position:relative;overflow:hidden;}
.weakness-alert h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.weakness-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.weakness-list li{font-size:14px;color:var(--text);display:flex;align-items:flex-start;gap:10px;line-height:1.6;transition:filter .5s;}
.weakness-list li::before{content:'→';color:var(--crimson);flex-shrink:0;}

/* ══ BLUR LOCK SYSTEM ══
   Everything blurrable gets .blur-target.
   .results.locked .blur-target → heavy blur.
   .results.unlocked .blur-target → no blur.
   Headings/labels are NOT .blur-target so always sharp.
*/
.blur-target{transition:filter .6s ease, opacity .6s ease;}
#results.locked .blur-target{
  filter:blur(9px);
  opacity:.55;
  pointer-events:none;
  user-select:none;
}
#results.unlocked .blur-target{
  filter:none;
  opacity:1;
  pointer-events:auto;
}
/* Canvas needs special treatment */
#results.locked #radarChart{filter:blur(10px);opacity:.5;pointer-events:none;}
#results.unlocked #radarChart{filter:none;opacity:1;}

/* LOCK OVERLAY on chart cards */
.lock-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;
  pointer-events:none;
  opacity:1;
  transition:opacity .4s;
}
#results.locked .lock-overlay{opacity:1;pointer-events:none;}
#results.unlocked .lock-overlay{opacity:0;pointer-events:none;}
.lock-badge{
  background:rgba(139,111,212,.18);
  border:1px solid rgba(139,111,212,.4);
  border-radius:100px;
  padding:6px 16px;
  font-size:11px;
  color:#c4b0f0;
  font-weight:600;
  letter-spacing:1px;
  backdrop-filter:blur(4px);
}

/* ── OFFER BOX ── */
.offer-box{background:linear-gradient(135deg,rgba(139,111,212,.13),rgba(232,160,32,.06));border:1px solid rgba(139,111,212,.3);border-radius:20px;padding:32px 28px;position:relative;overflow:hidden;margin-bottom:28px;}
.offer-box::after{content:'';position:absolute;top:-60%;left:-60%;width:220%;height:220%;background:conic-gradient(from 0deg,transparent 60%,rgba(139,111,212,.04) 70%,transparent 80%);animation:rotateBG 10s linear infinite;pointer-events:none;}
@keyframes rotateBG{to{transform:rotate(360deg);}}
.offer-inner{position:relative;z-index:1;}
.offer-eyebrow{font-size:10px;color:var(--violet);font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;text-align:center;}
.offer-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;margin-bottom:8px;text-align:center;line-height:1.3;}
.offer-sub{color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:18px;text-align:center;max-width:460px;margin-left:auto;margin-right:auto;}
.offer-feats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:22px;}
.offer-feat{font-size:11px;padding:5px 12px;border-radius:100px;background:rgba(139,111,212,.1);color:#c4b0f0;border:1px solid rgba(139,111,212,.2);}

/* PRICE ROW */
.price-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;}
.price-orig{font-size:15px;color:var(--muted);text-decoration:line-through;}
.price-now{font-family:'Playfair Display',serif;font-size:2.6rem;color:var(--gold);font-weight:700;line-height:1;}
.price-badge-pill{background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);color:#2ecc71;font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:100px;text-transform:uppercase;}
.price-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:24px;line-height:1.6;}

/* TWO-COL UNLOCK */
.unlock-cols{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:start;max-width:540px;margin:0 auto;}
@media(max-width:560px){.unlock-cols{grid-template-columns:1fr;gap:16px;}.divider-col{display:none!important;}}
.unlock-col{display:flex;flex-direction:column;gap:10px;}
.unlock-col-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;text-align:center;}
.divider-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 18px;gap:6px;}
.div-line{width:1px;flex:1;background:var(--border);}
.div-or{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}

/* PAY BTN */
.pay-btn{width:100%;padding:13px 20px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.pay-btn:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(232,160,32,.35);}
.trial-note{font-size:10.5px;color:var(--muted);text-align:center;line-height:1.5;}

/* COUPON */
.coupon-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;text-transform:uppercase;letter-spacing:2px;text-align:center;transition:border-color .2s;}
.coupon-input:focus{border-color:var(--violet);}
.coupon-input.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}
.coupon-input.ok-state{border-color:#2ecc71;color:#2ecc71;}
.apply-btn{width:100%;padding:12px;border-radius:8px;background:var(--bg3);border:1.5px solid var(--violet);color:#c4b0f0;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.apply-btn:hover{background:rgba(139,111,212,.15);border-color:#a080e8;}
.coupon-msg{font-size:11px;margin-top:5px;min-height:16px;text-align:center;}
.coupon-msg.err{color:var(--crimson);}
.coupon-msg.ok{color:#2ecc71;}

/* Post-unlock download */
.dl-area{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:4px;animation:slideUp .35s ease;}
.dl-note{font-size:11px;color:var(--muted);}

/* PAYMENT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px 28px;max-width:400px;width:100%;position:relative;animation:slideUp .3s ease;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;transition:color .2s;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.modal-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:#fff;}
.modal-sub{font-size:11px;color:var(--muted);}
.modal-amount-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;margin-bottom:22px;}
.modal-amount{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);}
.modal-amount-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;}
.modal-methods{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.modal-method{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:1.5px solid rgba(255,255,255,.07);border-radius:10px;cursor:pointer;transition:all .2s;}
.modal-method.active{border-color:var(--gold);background:rgba(232,160,32,.06);}
.modal-method-icon{font-size:18px;width:28px;text-align:center;}
.modal-method-name{font-size:13px;color:var(--text);font-weight:500;flex:1;}
.modal-method-sub{font-size:10px;color:var(--muted);}
.modal-radio{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);transition:all .2s;flex-shrink:0;}
.modal-method.active .modal-radio{border-color:var(--gold);background:var(--gold);}
.upi-field{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;margin-bottom:14px;transition:border-color .2s;}
.upi-field:focus{border-color:var(--gold);}
.modal-pay-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .2s;}
.modal-pay-btn:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(232,160,32,.3);}
.modal-pay-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.modal-secure{text-align:center;font-size:10px;color:var(--muted);margin-top:10px;}
/* Processing state */
.modal-processing{text-align:center;padding:20px 0;}
.processing-spinner{font-size:44px;margin-bottom:14px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.processing-bar{height:4px;background:var(--bg3);border-radius:100px;overflow:hidden;margin:16px 0 8px;}
.processing-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:100px;width:0%;transition:width 2.2s ease;}
/* Success state */
.modal-success{text-align:center;padding:16px 0;}
.success-emoji{font-size:52px;margin-bottom:12px;animation:popIn .4s cubic-bezier(.2,1.4,.5,1);}
@keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}

@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" id="btnEN" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btnHI" onclick="setLang('hi')">हिं</button>

<!-- ══ HOME ══ -->

function show(id){
  ['home','quiz','results'].forEach(p=>document.getElementById(p).classList.toggle('hidden',p!==id));
  window.scrollTo(0,0);
}
function goHome(){clearInterval(qTimer);show('home');}

/* ─── QUIZ ──────────────────────────────────── */
function startQuiz(){
  clearState();
  currentQ=0;
  userAnswers=Array(QB[lang].length).fill(null);
  dotStates=Array(QB[lang].length).fill(null);
  totalTimeSpent=0;
  savedResults=null;
  isUnlocked=false;
  const res=document.getElementById('results');
  res.classList.remove('unlocked');res.classList.add('locked');
  document.getElementById('couponSection').classList.remove('hidden');
  document.getElementById('downloadArea').classList.add('hidden');
  document.getElementById('payModal').classList.add('hidden');
  buildDots(QB[lang].length);
  show('quiz');
  loadQuestion(0);
}

function buildDots(n){
  const r=document.getElementById('dotRow');r.innerHTML='';
  for(let i=0;i<n;i++){const d=document.createElement('div');d.className='dot';d.id='dot_'+i;r.appendChild(d);}
}

function loadQuestion(idx){
  clearInterval(qTimer);qSeconds=35;qStartTime=Date.now();
  const qs=QB[lang],q=qs[idx];
  const uIdx=UNITS.findIndex(u=>u.key===q.key);
  const d=T[lang];
  document.getElementById('qUnitKey').textContent=`${d.unitOf} ${uIdx+1} ${d.unitOfSuffix}`;
  document.getElementById('qUnitLabel').textContent=d.unitLabels[uIdx];
  document.getElementById('progressText').textContent=`${d.qOf} ${idx+1} ${d.qOfSuffix} ${qs.length}`;
  const pct=Math.round((idx/qs.length)*100);
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('qCounter').textContent=`${idx+1} / ${qs.length}`;
  document.getElementById('passageArea').innerHTML=q.passage?`<div class="passage-box">${q.passage}</div>`:'';
  document.getElementById('diTableArea').innerHTML=q.diTable?`<div class="di-table-box">${q.diTable}</div>`:'';
  document.getElementById('qText').textContent=q.q;
  const oa=document.getElementById('optionsArea');oa.innerHTML='';
  ['A','B','C','D'].forEach((L,i)=>{
    const b=document.createElement('button');b.className='opt-btn';b.id='opt_'+i;
    b.innerHTML=`<span class="opt-letter">${L}</span><span class="opt-text">${q.opts[i]}</span>`;
    b.onclick=()=>selectAnswer(i);
    oa.appendChild(b);
  });
  document.getElementById('nextBtn').classList.add('hidden');
  updateTimer(qSeconds);startTimer();
}

function startTimer(){qTimer=setInterval(()=>{qSeconds--;updateTimer(qSeconds);if(qSeconds<=0){clearInterval(qTimer);autoAdvance();}},1000);}
function updateTimer(s){const el=document.getElementById('timerDisplay');el.textContent=s+'s';el.className='timer-badge'+(s<=8?' warn':'');}

function selectAnswer(idx){
  clearInterval(qTimer);
  // If first selection, start tracking time
  if(userAnswers[currentQ]===null){
    totalTimeSpent+=Math.round((Date.now()-qStartTime)/1000);
    // Restart the timer fresh for this question (paused while answering)
    qStartTime=Date.now()-((35-qSeconds)*1000);
  }
  userAnswers[currentQ]=idx;
  // Store dot state (updates on every re-selection)
  const q=QB[lang][currentQ];
  dotStates[currentQ]={selected:idx, correct:q.ans, isRight:idx===q.ans};
  // Visual: highlight selected only — NO green/red reveal yet
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{
    b.classList.remove('selected');
    if(i===idx) b.classList.add('selected');
  });
  // Dot: neutral answered indicator
  const dot=document.getElementById('dot_'+currentQ);
  dot.classList.remove('answered-dot');dot.classList.add('answered-dot');
  document.getElementById('nextBtn').classList.remove('hidden');
  // Save state on every answer
  saveState();
}

function autoAdvance(){
  if(userAnswers[currentQ]===null){
    userAnswers[currentQ]=-1;
    totalTimeSpent+=35;
    dotStates[currentQ]={selected:-1, correct:QB[lang][currentQ].ans, isRight:false};
    document.getElementById('dot_'+currentQ).classList.add('answered-dot');
    saveState();
  }
  nextQuestion();
}
function nextQuestion(){
  saveState();
  if(currentQ<QB[lang].length-1){currentQ++;loadQuestion(currentQ);}
  else finishQuiz();
}
function finishQuiz(){clearInterval(qTimer);show('results');renderResults();saveState();}

/* ─── RESULTS ───────────────────────────────── */
function renderResults(){
  const qs=QB['en']; // always score against EN answer keys
  const ua=userAnswers;
  const correct=ua.filter((a,i)=>a===qs[i].ans).length;
  const pct=Math.round((correct/qs.length)*100);
  const avgT=Math.round(totalTimeSpent/qs.length);
  const labs=T['en'].unitLabels; // always EN keys for PDF
  const wt=T['en'].weakTips;
  const d=T[lang]; // display language

  document.getElementById('scoreCorrect').textContent=correct;
  document.getElementById('scoreWrong').textContent=qs.length-correct;
  document.getElementById('scorePct').textContent=pct+'%';
  document.getElementById('scoreTime').textContent=avgT+'s';
  document.getElementById('resultsSub').textContent=
    pct>=70?d.subHigh:pct>=50?d.subMid:d.subLow;

  const us={};
  UNITS.forEach(u=>{us[u.key]={correct:0,total:0};});
  qs.forEach((q,i)=>{us[q.key].total++;if(ua[i]===q.ans)us[q.key].correct++;});
  savedResults={correct,pct,avgT,us,qs,labs,wt};

  // Unit breakdown
  const bl=document.getElementById('breakdownList');bl.innerHTML='';
  const wArr=[];
  UNITS.forEach((u,i)=>{
    const s=us[u.key];if(!s.total)return;
    const p=Math.round((s.correct/s.total)*100);
    if(p<50)wArr.push({key:u.key,label:labs[i],pct:p});
    const color=p<50?'var(--crimson)':p<75?'var(--gold)':'#2ecc71';
    const row=document.createElement('div');row.className='unit-row';
    row.innerHTML=`
      <span class="unit-name">${d.unitLabels[i]}</span>
      <div class="unit-bar-wrap"><div class="unit-bar blur-target" id="bar_${u.key}" style="width:0%;background:${color}"></div></div>
      <span class="unit-score blur-target" id="sc_${u.key}">${s.correct}/${s.total}</span>
      <span class="blur-target">${p<50?`<span class="weak-tag">${d.weakTag}</span>`:p===100?`<span class="strong-tag">${d.strongTag}</span>`:''}</span>`;
    bl.appendChild(row);
    setTimeout(()=>{const b=document.getElementById('bar_'+u.key);if(b)b.style.width=p+'%';},160);
  });

  // Weak zones — heading always visible, tips blurred
  const wa=document.getElementById('weaknessAlert');
  if(wArr.length===0){
    wa.style.cssText='background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.25);border-radius:14px;padding:22px 26px;margin-bottom:24px;';
    wa.innerHTML=`<h3 style="color:#2ecc71;font-family:Playfair Display,serif;font-size:1rem;">${d.noWeak}</h3>`;
  } else {
    wa.style.cssText='background:rgba(224,80,80,.07);border:1px solid rgba(224,80,80,.25);border-radius:14px;padding:22px 26px;margin-bottom:24px;';
    let html=`<h3 style="color:var(--crimson);font-family:Playfair Display,serif;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;">${d.weakTitle}</h3><ul class="weakness-list">`;
    wArr.sort((a,b)=>a.pct-b.pct).forEach(({key,label,pct})=>{
      html+=`<li class="blur-target"><span><strong>${lang==='hi'?d.unitLabels[UNITS.findIndex(u=>u.key===key)]:label}</strong> (${pct}%) — ${lang==='hi'?d.weakTips[key]:wt[key]||''}</span></li>`;
    });
    html+='</ul>';
    wa.innerHTML=html;
  }

  drawRadar(us);
  if(pct>=70)launchConfetti();
}

function drawRadar(us){
  const canvas=document.getElementById('radarChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(W,H)*0.32,n=UNITS.length;
  ctx.clearRect(0,0,W,H);
  const A=UNITS.map((_,i)=>(Math.PI*2*i/n)-Math.PI/2);
  [.25,.5,.75,1].forEach(f=>{
    ctx.beginPath();
    A.forEach((a,i)=>{const x=cx+R*f*Math.cos(a),y=cy+R*f*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.closePath();ctx.strokeStyle=`rgba(232,160,32,${f===1?.2:.06})`;ctx.lineWidth=1;ctx.stroke();
  });
  A.forEach(a=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='rgba(232,160,32,.09)';ctx.lineWidth=1;ctx.stroke();});
  const sc=UNITS.map(u=>{const s=us[u.key];return s&&s.total?s.correct/s.total:0;});
  ctx.beginPath();A.forEach((a,i)=>{const x=cx+R*sc[i]*Math.cos(a),y=cy+R*sc[i]*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.closePath();ctx.fillStyle='rgba(232,160,32,.15)';ctx.fill();ctx.strokeStyle='rgba(232,160,32,.7)';ctx.lineWidth=2;ctx.stroke();
  A.forEach((a,i)=>{const x=cx+R*sc[i]*Math.cos(a),y=cy+R*sc[i]*Math.sin(a);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=sc[i]<.5?'#e05050':sc[i]<.75?'#e8a020':'#2ecc71';ctx.fill();});
  const sh=T[lang].unitShort;
  ctx.textAlign='center';ctx.textBaseline='middle';
  A.forEach((a,i)=>{
    const lx=cx+(R+28)*Math.cos(a),ly=cy+(R+28)*Math.sin(a),p=Math.round(sc[i]*100);
    ctx.font='600 8px sans-serif';ctx.fillStyle=sc[i]<.5?'#e05050':'#e8e4d8';ctx.fillText(sh[i],lx,ly-5);
    ctx.font='500 7px monospace';ctx.fillStyle=sc[i]<.5?'#e05050':'rgba(232,160,32,.85)';ctx.fillText(p+'%',lx,ly+6);
  });
  const ov=sc.reduce((a,b)=>a+b,0)/sc.length;
  ctx.font='bold 18px serif';ctx.fillStyle=ov<.5?'#e05050':'#e8a020';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(Math.round(ov*100)+'%',cx,cy-6);
  ctx.font='500 9px sans-serif';ctx.fillStyle='rgba(232,160,32,.55)';ctx.fillText(T[lang].overallLabel,cx,cy+12);
}

function makePDF(entries){
  const PW=595.28,PH=841.89,ML=45,MT=55,MB=55,LH=12,FSN=8.5,FSB=8.5;
  const MAX_CHARS=Math.floor((PW-ML-ML)/5.15);
  function wrap(entry){
    if(entry.text.length<=MAX_CHARS)return [entry];
    const words=entry.text.split(' ');const out=[];let cur='';
    const lead=entry.text.match(/^(\s*)/)[1];
    words.forEach(w=>{const test=(cur?cur+' ':lead)+w;if(test.length>MAX_CHARS&&cur){out.push({text:cur,bold:entry.bold});cur=lead+w;}else cur=test;});
    if(cur)out.push({text:cur,bold:entry.bold});
    return out.length?out:[entry];
  }
  const flat=[];entries.forEach(e=>wrap(e).forEach(l=>flat.push(l)));
  const pages=[];let page=[],y=MT;
  flat.forEach(e=>{if(y+LH>PH-MB&&page.length){pages.push(page);page=[];y=MT;}page.push({...e,absY:PH-y});y+=LH;});
  if(page.length)pages.push(page);
  const esc=s=>s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
  let id=1;
  const catId=id++,pagesId=id++,fnId=id++,fbId=id++;
  const pageIds=pages.map(()=>id++);const strmIds=pages.map(()=>id++);const totalObjs=id;
  const streams=pages.map(pg=>{
    let s='';
    pg.forEach(e=>{const fn=e.bold?'FB':'FN';const fs=e.bold?FSB:FSN;const safe=esc(e.text.replace(/[^\x20-\x7E]/g,'?'));s+=`BT /${fn} ${fs} Tf ${ML} ${e.absY.toFixed(2)} Td (${safe}) Tj ET\n`;});
    return s;
  });
  const off={};let out='%PDF-1.4\n';
  function wo(oid,content){off[oid]=out.length;out+=`${oid} 0 obj\n${content}\nendobj\n`;}
  wo(catId,`<< /Type /Catalog /Pages ${pagesId} 0 R >>`);
  wo(pagesId,`<< /Type /Pages /Kids [${pageIds.map(i=>i+' 0 R').join(' ')}] /Count ${pages.length} >>`);
  wo(fnId,`<< /Type /Font /Subtype /Type1 /BaseFont /Courier /Encoding /WinAnsiEncoding >>`);
  wo(fbId,`<< /Type /Font /Subtype /Type1 /BaseFont /Courier-Bold /Encoding /WinAnsiEncoding >>`);
  pages.forEach((_,pi)=>{
    wo(pageIds[pi],`<< /Type /Page /Parent ${pagesId} 0 R /MediaBox [0 0 ${PW} ${PH}] /Contents ${strmIds[pi]} 0 R /Resources << /Font << /FN ${fnId} 0 R /FB ${fbId} 0 R >> >> >>`);
    const s=streams[pi];wo(strmIds[pi],`<< /Length ${s.length} >>\nstream\n${s}endstream`);
  });
  const xOff=out.length;
  out+=`xref\n0 ${totalObjs}\n0000000000 65535 f \n`;
  for(let i=1;i<totalObjs;i++)out+=`${String(off[i]||0).padStart(10,'0')} 00000 n \n`;
  out+=`trailer\n<< /Size ${totalObjs} /Root ${catId} 0 R >>\nstartxref\n${xOff}\n%%EOF`;
  const bytes=new Uint8Array(out.length);
  for(let i=0;i<out.length;i++)bytes[i]=out.charCodeAt(i)&0xff;
  return bytes;
}

/* ─── LOCALSTORAGE PERSISTENCE ───────────────── */
const LS_KEY='ugcnet_state';

function saveState(){
  try{
    const state={
      lang,
      currentQ,
      userAnswers,
      dotStates,
      totalTimeSpent,
      savedResults,
      isUnlocked,
      page: document.getElementById('results').classList.contains('hidden')?
            (document.getElementById('quiz').classList.contains('hidden')?'home':'quiz'):'results'
    };
    localStorage.setItem(LS_KEY,JSON.stringify(state));
  }catch(e){}
}

function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return false;
    const state=JSON.parse(raw);
    if(!state||!state.userAnswers||!state.userAnswers.length)return false;

    lang=state.lang||'en';
    setLang(lang);

    userAnswers=state.userAnswers;
    dotStates=state.dotStates||[];
    totalTimeSpent=state.totalTimeSpent||0;
    isUnlocked=state.isUnlocked||false;
    savedResults=state.savedResults||null;

    if(state.page==='results'&&savedResults){
      // Restore results page
      show('results');
      renderResults();
      if(isUnlocked){
        const res=document.getElementById('results');
        res.classList.remove('locked');res.classList.add('unlocked');
        document.getElementById('couponSection').classList.add('hidden');
        document.getElementById('downloadArea').classList.remove('hidden');
        // Restore dots correct/wrong
        dotStates.forEach((ds,i)=>{
          const dot=document.getElementById('dot_'+i);
          if(!dot||!ds)return;
          dot.classList.remove('answered-dot');
          dot.classList.add(ds.isRight?'correct-dot':'wrong-dot');
        });
      }
      return true;
    } else if(state.page==='quiz'){
      // Restore quiz at current question
      currentQ=state.currentQ||0;
      buildDots(QB[lang].length);
      show('quiz');
      // Restore all dot states first
      dotStates.forEach((ds,i)=>{
        if(!ds)return;
        const dot=document.getElementById('dot_'+i);
        if(dot)dot.classList.add('answered-dot');
      });
      loadQuestion(currentQ);
      // Re-apply selected state if this question was already answered
      if(userAnswers[currentQ]!==null&&userAnswers[currentQ]!==-1){
        const sel=userAnswers[currentQ];
        setTimeout(()=>{
          document.querySelectorAll('.opt-btn').forEach((b,i)=>{
            b.classList.remove('selected');
            if(i===sel)b.classList.add('selected');
          });
          document.getElementById('nextBtn').classList.remove('hidden');
        },50);
      }
      return true;
    }
  }catch(e){}
  return false;
}

function clearState(){
  try{localStorage.removeItem(LS_KEY);}catch(e){}
}

/* ─── INIT ──────────────────────────────────── */
setLang('en');
if(!loadState()){
  // Fresh start — just show home
  show('home');
}
